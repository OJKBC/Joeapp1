<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>こえ テスト</title>
<style>
  body { font-family: -apple-system, sans-serif; margin: 0; padding: 16px; background: #0d081e; color: #fff; }
  h1 { font-size: 20px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 10px; margin: 8px 0;
         background: #1b1436; border-radius: 12px; }
  .row.ja { background: #243a6b; }
  .meta { flex: 1; font-size: 14px; line-height: 1.4; }
  .meta b { font-size: 16px; }
  .tag { font-size: 11px; opacity: .7; }
  button { font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
           background: #ffc62e; color: #1b1436; border: none; border-radius: 999px;
           padding: 8px 16px; }
  .controls { margin: 10px 0; font-size: 14px; }
  input[type=text] { font-size: 16px; padding: 6px; border-radius: 8px; border: none; width: 100%; box-sizing: border-box; }
  label { display: inline-block; margin: 6px 12px 6px 0; }
  #count { opacity: .7; font-size: 13px; }
</style>
</head>
<body>
  <h1>🔊 この たんまつの こえ いちらん</h1>
  <p id="count">よみこみ中…</p>

  <div class="controls">
    <label>よむ ことば：</label>
    <input type="text" id="phrase" value="きょうりゅう" />
    <div>
      <label>はやさ <input type="range" id="rate" min="0.3" max="1.2" step="0.01" value="0.78"> <span id="rateV">0.78</span></label>
      <label>たかさ <input type="range" id="pitch" min="0.5" max="1.6" step="0.01" value="1.05"> <span id="pitchV">1.05</span></label>
    </div>
    <p class="tag">青い行が日本語の声です。「きく」を押して聞き比べ、いちばん自然な声の <b>なまえ</b> を教えてください。</p>
  </div>

  <div id="list"></div>

<script>
const $ = id => document.getElementById(id);
$('rate').oninput = () => $('rateV').textContent = $('rate').value;
$('pitch').oninput = () => $('pitchV').textContent = $('pitch').value;

function speakWith(v){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance($('phrase').value || 'こんにちは');
  u.voice = v; u.lang = v.lang;
  u.rate = parseFloat($('rate').value);
  u.pitch = parseFloat($('pitch').value);
  speechSynthesis.speak(u);
}

function render(){
  const voices = speechSynthesis.getVoices();
  const ja = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('ja'));
  const others = voices.filter(v => !(v.lang && v.lang.toLowerCase().startsWith('ja')));
  const ordered = [...ja, ...others];
  $('count').textContent = 'ぜんぶで ' + voices.length + 'こ（にほんご ' + ja.length + 'こ）';
  const box = $('list'); box.innerHTML = '';
  ordered.forEach(v => {
    const d = document.createElement('div');
    d.className = 'row' + (v.lang && v.lang.toLowerCase().startsWith('ja') ? ' ja' : '');
    d.innerHTML = '<div class="meta"><b>' + v.name + '</b><br>' +
      '<span class="tag">' + v.lang + (v.localService ? ' ・本体' : ' ・ネット') +
      (v.default ? ' ・きほん' : '') + '</span></div>';
    const b = document.createElement('button');
    b.textContent = 'きく';
    b.onclick = () => speakWith(v);
    d.appendChild(b);
    box.appendChild(d);
  });
}
render();
if('speechSynthesis' in window) speechSynthesis.onvoiceschanged = render;
</script>
</body>
</html>
