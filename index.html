<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ひらがなバトル！</title>
<style>
  :root {
    --night-1: #221551;
    --night-2: #4a2391;
    --hero: #34c2e3;
    --hero-dark: #1b8fb0;
    --yokai: #b14aed;
    --yokai-dark: #7a26a8;
    --gold: #ffd23f;
    --heart: #ff5d73;
    --good: #46e07a;
    --paper: #fffdf5;
    --ink: #2a2150;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }

  body {
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN",
                 "Rounded Mplus 1c", "Quicksand", "Comic Sans MS", system-ui, sans-serif;
    color: var(--paper);
    background: radial-gradient(120% 90% at 50% 0%, var(--night-2) 0%, var(--night-1) 60%, #160d33 100%);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #app {
    height: 100dvh;
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    text-align: center;
  }
  .screen.active { display: flex; }

  .btn {
    font-family: inherit;
    font-weight: 800;
    border: none;
    border-radius: 999px;
    padding: 18px 34px;
    font-size: 22px;
    color: #fff;
    background: linear-gradient(180deg, var(--hero) 0%, var(--hero-dark) 100%);
    box-shadow: 0 6px 0 var(--hero-dark), 0 10px 18px rgba(0,0,0,.35);
    cursor: pointer;
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .btn:active { transform: translateY(5px); box-shadow: 0 1px 0 var(--hero-dark), 0 4px 10px rgba(0,0,0,.3); }
  .btn:focus-visible { outline: 4px solid #fff; outline-offset: 3px; }

  /* title */
  #title { justify-content: center; gap: 26px; }
  .game-logo {
    font-size: clamp(40px, 13vw, 72px);
    font-weight: 900;
    line-height: 1.05;
    text-shadow: 0 4px 0 var(--yokai-dark), 0 8px 18px rgba(0,0,0,.5);
    letter-spacing: 2px;
  }
  .game-logo .pop { color: var(--gold); }
  .logo-mons { font-size: clamp(54px, 18vw, 100px); }

  /* hero select */
  #select { justify-content: center; gap: 22px; }
  .heads { font-size: 26px; font-weight: 800; }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
  .hero-card {
    background: rgba(255,255,255,.08);
    border: 3px solid rgba(255,255,255,.18);
    border-radius: 26px;
    padding: 18px 8px 14px;
    cursor: pointer;
    transition: transform .1s ease, border-color .1s ease, background .1s ease;
  }
  .hero-card:active { transform: scale(.94); }
  .hero-card.sel { border-color: var(--gold); background: rgba(255,210,63,.18); }
  .hero-card .face { font-size: 64px; display: block; }
  .hero-card .nm { font-weight: 800; margin-top: 6px; font-size: 18px; }

  /* battle */
  #battle { justify-content: flex-start; padding-top: 12px; gap: 10px; }

  /* battle field (緑のフィールド) */
  .field {
    position: relative;
    width: 100%;
    height: 33vh; min-height: 196px; max-height: 290px;
    border-radius: 18px;
    background:
      radial-gradient(60% 38% at 72% 30%, rgba(255,255,255,.25), rgba(255,255,255,0) 70%),
      radial-gradient(120% 90% at 50% 28%, #a6d977 0%, #74b948 46%, #4f8f2c 100%);
    border: 3px solid var(--ink);
    box-shadow: 0 6px 0 rgba(0,0,0,.3), inset 0 0 0 2px rgba(255,255,255,.18);
    overflow: hidden;
  }

  .platform {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 35%, rgba(255,255,255,.30), rgba(0,0,0,.18));
    box-shadow: 0 4px 8px rgba(0,0,0,.25);
  }
  .enemy-plat { width: 44%; height: 40px; top: 33%; right: 5%; }
  .hero-plat  { width: 54%; height: 52px; bottom: 5%; left: 2%; }

  .mon {
    position: absolute; line-height: 1;
    filter: drop-shadow(0 6px 6px rgba(0,0,0,.4));
    transition: transform .12s ease;
  }
  .enemy-mon { top: 7%; right: 13%; font-size: clamp(54px, 16vw, 82px); }
  .hero-mon  { bottom: 9%; left: 8%;  font-size: clamp(70px, 22vw, 104px); }

  .mon.hit { animation: shake .4s; }
  .mon.attack { animation: lunge .35s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-12px) rotate(-6deg); }
    40% { transform: translateX(12px) rotate(6deg); }
    60% { transform: translateX(-8px) rotate(-4deg); }
    80% { transform: translateX(8px) rotate(4deg); }
  }
  @keyframes lunge {
    0%,100% { transform: translate(0,0); }
    40% { transform: translate(40px,-28px) scale(1.08); }
  }

  /* なまえ＋HP の枠（ポケモン風） */
  .info {
    position: absolute;
    background: #f7f3e0; color: var(--ink);
    border: 3px solid var(--ink); border-radius: 10px;
    padding: 5px 12px 7px;
    box-shadow: 3px 3px 0 rgba(0,0,0,.28);
    min-width: 46%;
  }
  .info.enemy { top: 8px; left: 8px; }
  .info.hero  { bottom: 8px; right: 8px; }
  .info .row1 {
    display: flex; justify-content: space-between; align-items: baseline;
    font-weight: 800; font-size: clamp(12px, 3.6vw, 15px); gap: 8px; white-space: nowrap;
  }
  .info .lv { font-size: clamp(10px, 3vw, 12px); }
  .hpline { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
  .hpline .hp { font-size: 10px; font-weight: 900; color: #d98a00; font-style: italic; }
  .hpbar {
    flex: 1; height: 9px; background: #5a5048;
    border: 1px solid var(--ink); border-radius: 6px; overflow: hidden;
  }
  .hpbar > i { display: block; height: 100%; background: linear-gradient(#8dec5a, #3fae00); transition: width .3s ease; }
  .info .hearts { font-size: 16px; letter-spacing: 1px; margin-top: 3px; min-height: 20px; }
  .info .score { font-size: 12px; font-weight: 800; color: #c79b14; margin-top: 2px; }

  /* メッセージ枠（ポケモン下部のテキスト） */
  .msgbox {
    width: 100%;
    background: var(--paper); color: var(--ink);
    border: 3px solid var(--ink); border-radius: 14px;
    box-shadow: 0 5px 0 rgba(0,0,0,.25);
    padding: 12px 16px;
    font-weight: 800; font-size: clamp(18px, 5.5vw, 24px);
    display: flex; align-items: center; gap: 10px;
  }
  .msgbox .pic { font-size: 28px; }
  .msgbox #question { flex: 1; text-align: center; }
  .listen-btn {
    border: none; background: var(--gold); color: var(--ink);
    border-radius: 999px; font-size: 20px; font-family: inherit; font-weight: 800;
    padding: 4px 10px; cursor: pointer; box-shadow: 0 3px 0 #c79b14;
  }
  .listen-btn:active { transform: translateY(3px); }

  /* 攻撃の弾（波動拳ふう）と着弾エフェクト */
  .projectile {
    position: absolute; width: 44px; height: 44px; border-radius: 50%;
    pointer-events: none; z-index: 5; transform: translate(-50%,-50%);
  }
  .projectile::after {
    content: ''; position: absolute; inset: -7px; border-radius: 50%;
    background: inherit; opacity: .35; filter: blur(7px);
  }
  .projectile.hero {
    background: radial-gradient(circle at 38% 35%, #ffffff, #8fe9ff 34%, #1f9bd6 68%, rgba(31,155,214,0) 72%);
    box-shadow: 0 0 18px 7px rgba(90,200,255,.75);
  }
  .projectile.enemy {
    background: radial-gradient(circle at 38% 35%, #fff0a8, #ff8ae6 34%, #a12bd6 68%, rgba(161,43,214,0) 72%);
    box-shadow: 0 0 18px 7px rgba(190,100,255,.75);
  }
  .burst {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    transform: translate(-50%,-50%); pointer-events: none; z-index: 6;
    background: radial-gradient(circle, #fff 0%, #ffd23f 45%, rgba(255,210,63,0) 70%);
  }

  /* ヒット時の画面シェイク */
  #app.shake { animation: screenShake .34s ease; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    12% { transform: translate(-7px, 4px); }
    26% { transform: translate(8px, -5px); }
    40% { transform: translate(-6px, -4px); }
    55% { transform: translate(6px, 5px); }
    70% { transform: translate(-4px, 2px); }
    85% { transform: translate(3px, -2px); }
  }

  /* choices grid */
  .choices {
    width: 100%;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-content: center;
    padding-top: 6px;
    min-height: 0;
  }
  .choice {
    font-family: inherit; font-weight: 900;
    border: none; border-radius: 22px;
    background: linear-gradient(180deg, #ffffff, #ece6ff);
    color: var(--ink);
    cursor: pointer;
    min-height: 78px;
    padding: 10px 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(26px, 8vw, 44px);
    letter-spacing: 2px;
    box-shadow: 0 6px 0 #b9add9, 0 8px 14px rgba(0,0,0,.3);
    transition: transform .08s ease;
  }
  .choice:active { transform: translateY(5px); box-shadow: 0 1px 0 #b9add9; }
  .choice:focus-visible { outline: 4px solid var(--gold); outline-offset: 3px; }
  .choice.correct { background: linear-gradient(180deg, #b6ffce, #46e07a); box-shadow: 0 6px 0 #1f9c4f; }
  .choice.wrong { background: linear-gradient(180deg, #ffc4cf, #ff5d73); box-shadow: 0 6px 0 #c2384f; animation: shake .4s; }
  .choice.dim { opacity: .35; }

  /* flash */
  .flash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 26vw; font-weight: 900; pointer-events: none; opacity: 0; z-index: 50;
  }
  .flash.show { animation: flashAnim .9s ease; }
  @keyframes flashAnim {
    0% { opacity: 0; transform: scale(.4); }
    25% { opacity: 1; transform: scale(1.1); }
    70% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1); }
  }

  /* end screens */
  #over, #cleared { justify-content: center; gap: 22px; }
  .big-emoji { font-size: 96px; }
  .end-title { font-size: 36px; font-weight: 900; }
  .score-pill {
    background: var(--gold); color: var(--ink);
    border-radius: 999px; padding: 6px 18px; font-size: 22px; font-weight: 800;
    box-shadow: 0 4px 0 #c79b14;
  }

  @media (prefers-reduced-motion: reduce) {
    *, .flash.show, .yokai.hit, .choice.wrong { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- TITLE -->
  <section id="title" class="screen active">
    <div class="logo-mons">👹❓🦸</div>
    <div class="game-logo">ひらがな<br><span class="pop">バトル！</span></div>
    <button class="btn" id="startBtn">はじめる</button>
  </section>

  <!-- HERO SELECT -->
  <section id="select" class="screen">
    <div class="heads">きみの ヒーローを えらんでね</div>
    <div class="hero-grid" id="heroGrid"></div>
    <button class="btn" id="goBattle" disabled style="opacity:.5">バトルへ！</button>
  </section>

  <!-- BATTLE -->
  <section id="battle" class="screen">
    <div class="field">
      <div class="info enemy">
        <div class="row1"><span id="enemyName">ようかい</span><span class="lv">Lv <span id="enemyLv">1</span></span></div>
        <div class="hpline"><span class="hp">HP</span><div class="hpbar"><i id="yokaiHp" style="width:100%"></i></div></div>
      </div>
      <div class="platform enemy-plat"></div>
      <div class="mon enemy-mon" id="yokai">👹</div>

      <div class="platform hero-plat"></div>
      <div class="mon hero-mon" id="heroMon">🦸</div>
      <div class="info hero">
        <div class="row1"><span id="heroName">ヒーロー</span><span class="lv">Lv <span id="heroLv">1</span></span></div>
        <div class="hearts" id="hearts"></div>
        <div class="score">⭐ <span id="score">0</span></div>
      </div>
    </div>

    <div class="msgbox">
      <span class="pic" id="pic"></span>
      <span id="question">きいて どれだ〜！</span>
      <button class="listen-btn" id="listenBtn" aria-label="もういちど きく">🔊</button>
    </div>

    <div class="choices" id="choices"></div>
  </section>

  <!-- GAME OVER -->
  <section id="over" class="screen">
    <div class="big-emoji">😵</div>
    <div class="end-title">やられた〜！</div>
    <div class="score-pill">⭐ <span id="overScore">0</span> てん</div>
    <button class="btn" id="retryBtn">もういちど バトル！</button>
  </section>

  <!-- CLEARED -->
  <section id="cleared" class="screen">
    <div class="big-emoji">🏆</div>
    <div class="end-title">ぜんぶ クリア！</div>
    <div class="score-pill">⭐ <span id="clearScore">0</span> てん</div>
    <button class="btn" id="againBtn">もういちど あそぶ</button>
  </section>

  <div class="flash" id="flash"></div>
</div>

<script>
/* =========================================================
   せってい — ここを変えると挙動を調整できます
   ========================================================= */
const CONFIG = {
  startHearts: 5,        // ヒーローのライフ
  yokaiHp: 3,            // 妖怪をたおすのに必要な正解数（1レベル＝妖怪1体）
  choiceCount: 5,        // えらぶ文字の数
  // まちがえたときの罰: 'heart'（ライフ-1・やさしめ）か 'score'（スコア-1）
  penaltyMode: 'heart',
  speakPrompt: true,     // 妖怪が文字を読み上げるか（※これはTTS=読み上げ。マイクは不要）
  showPromptText: false, // 問題の文字を吹き出しに表示するか（false=ネタバレなし。音をきいて当てる）
  rate: 0.65,            // 読み上げ速度（小さいほどゆっくり）
  sound: true            // 効果音（ビーム音・着弾音）のオン/オフ
};

/* =========================================================
   もんだいデータ（レベルが上がると 1→2→3 文字に）
   ========================================================= */
const LEVELS = [
  { name: '2もじ（あ〜ん）', hp: 12, items: [
    {t:'あし',p:'🦶'},{t:'うみ',p:'🌊'},{t:'ふえ',p:'🎵'},{t:'そら',p:'☁️'},{t:'てら',p:'⛩️'},{t:'にわ',p:'🪴'},
    {t:'はれ',p:'☀️'},{t:'ゆめ',p:'💭'},{t:'つき',p:'🌙'},{t:'ねこ',p:'🐱'},{t:'へや',p:'🚪'},{t:'ふろ',p:'🛁'}
  ]},
  { name: '3もじ（あ〜ん）', hp: 13, items: [
    {t:'きりん',p:'🦒'},{t:'すいか',p:'🍉'},{t:'くるま',p:'🚗'},{t:'ことり',p:'🐦'},{t:'たぬき',p:'🦝'},
    {t:'せかい',p:'🌍'},{t:'ほたる',p:'🪲'},{t:'けむり',p:'💨'},{t:'ひよこ',p:'🐤'},{t:'おもち',p:'🍡'},
    {t:'きのこ',p:'🍄'},{t:'やさい',p:'🥬'},{t:'みなと',p:'⚓'}
  ]},
  { name: 'てんてん（濁点）', items: [
    {t:'りんご',p:'🍎'},{t:'ぶどう',p:'🍇'},{t:'ばなな',p:'🍌'},{t:'だんご',p:'🍡'},{t:'でんわ',p:'☎️'},
    {t:'かばん',p:'🎒'},{t:'たまご',p:'🥚'},{t:'めがね',p:'👓'},{t:'ごりら',p:'🦍'}
  ]},
  { name: 'まる（半濁点）', items: [
    {t:'ぱんだ',p:'🐼'},{t:'ぴあの',p:'🎹'},{t:'ぷりん',p:'🍮'},{t:'ぱんや',p:'🥐'},{t:'ぴんく',p:'🩷'},
    {t:'ぺん',p:'🖊️'},{t:'たんぽぽ',p:'🌼'},{t:'えんぴつ',p:'✏️'},{t:'てんぷら',p:'🍤'}
  ]},
  { name: 'ちいさい っ', items: [
    {t:'きって',p:'📮'},{t:'かっぱ',p:'🥒'},{t:'しっぽ',p:'🐕'},{t:'こっぷ',p:'🥤'},
    {t:'らっぱ',p:'🎺'},{t:'きっぷ',p:'🎫'},{t:'ばった',p:'🦗'}
  ]},
  { name: 'のばすおと ー', items: [
    {t:'けーき',p:'🍰'},{t:'かれー',p:'🍛'},{t:'すきー',p:'🎿'},{t:'ぼーる',p:'⚽'},{t:'ぷーる',p:'🏊'},
    {t:'ごーる',p:'🥅'},{t:'らーめん',p:'🍜'},{t:'こーひー',p:'☕'},{t:'せーたー',p:'🧥'}
  ]},
  { name: 'ちいさい ゃゅょ（拗音）', items: [
    {t:'おちゃ',p:'🍵'},{t:'ちょう',p:'🦋'},{t:'りゅう',p:'🐉'},{t:'きしゃ',p:'🚂'},
    {t:'ちゃわん',p:'🍵'},{t:'おもちゃ',p:'🧸'},{t:'にんじゃ',p:'🥷'},{t:'きんぎょ',p:'🐠'},
    {t:'でんしゃ',p:'🚃'},{t:'かぼちゃ',p:'🎃'}
  ]}
];

const HEROES = [
  {face:'🦸', nm:'ヒーロー'},
  {face:'🤖', nm:'ロボ'},
  {face:'🐯', nm:'タイガー'},
  {face:'🐲', nm:'ドラゴン'}
];
const YOKAI = ['👻','👹','👺','😈','🧟','👾','🐉'];

const state = {
  hero: null, hearts: CONFIG.startHearts, score: 0,
  levelIdx: 0, queue: [], current: null,
  yokaiIdx: 0, yokaiHp: CONFIG.yokaiHp, busy: false
};

const $ = id => document.getElementById(id);
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function shuffle(a){ return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]); }

/* ---- 読み上げ（TTS・マイク不要） ---- */
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text){
  if(!CONFIG.speakPrompt || !('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.rate = CONFIG.rate;
    const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith('ja'));
    if(v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---- ヒーロー選択 ---- */
function buildHeroGrid(){
  const g = $('heroGrid'); g.innerHTML = '';
  HEROES.forEach(h => {
    const c = document.createElement('div');
    c.className = 'hero-card';
    c.innerHTML = '<span class="face">'+h.face+'</span><div class="nm">'+h.nm+'</div>';
    c.onclick = () => {
      document.querySelectorAll('.hero-card').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel'); state.hero = h;
      $('goBattle').disabled = false; $('goBattle').style.opacity = 1;
    };
    g.appendChild(c);
  });
}

/* ---- ゲーム ---- */
function startGame(){
  state.hearts = CONFIG.startHearts; state.score = 0;
  state.levelIdx = 0; state.yokaiIdx = 0;
  newQueue(); spawnYokai(); renderTop();
  show('battle'); nextQuestion();
}
function newQueue(){ state.queue = shuffle(LEVELS[state.levelIdx].items.slice()); }
function spawnYokai(){
  state.yokaiHpMax = LEVELS[state.levelIdx].hp || CONFIG.yokaiHp;
  state.yokaiHp = state.yokaiHpMax;
  $('yokai').textContent = YOKAI[state.yokaiIdx % YOKAI.length];
  $('yokaiHp').style.width = '100%';
  // ヒーロー＆レベル表示
  if(state.hero){ $('heroMon').textContent = state.hero.face; $('heroName').textContent = state.hero.nm; }
  $('heroLv').textContent = state.levelIdx + 1;
  $('enemyLv').textContent = state.levelIdx + 1;
}
function renderTop(){
  let h = '';
  for(let i=0;i<CONFIG.startHearts;i++) h += i < state.hearts ? '❤️' : '🤍';
  $('hearts').textContent = h;
  $('score').textContent = state.score;
}

function nextQuestion(){
  state.busy = false;
  if(state.queue.length === 0) newQueue();
  const item = state.current = state.queue.shift();

  $('pic').textContent = item.p || '';
  $('question').textContent = CONFIG.showPromptText ? ('「'+item.t+'」は どれだ〜！') : 'きいて どれだ〜！';
  buildChoices(item);
  speak(item.t);
}

function buildChoices(item){
  const others = LEVELS[state.levelIdx].items.filter(x => x.t !== item.t);
  const sameLen = shuffle(others.filter(x => x.t.length === item.t.length));
  const diffLen = shuffle(others.filter(x => x.t.length !== item.t.length));
  const pool = sameLen.concat(diffLen); // 同じ文字数を優先（読まないと当てられない）
  const picks = shuffle(pool.slice(0, CONFIG.choiceCount - 1).concat([item]));
  const box = $('choices'); box.innerHTML = '';
  picks.forEach(p => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = p.t;
    b.onclick = () => choose(b, p.t === item.t);
    box.appendChild(b);
  });
}

function choose(btn, correct){
  if(state.busy) return;
  state.busy = true;

  if(correct){
    btn.classList.add('correct');
    flash('⭕', 'var(--good)');
    state.score++; state.yokaiHp--;
    renderTop();
    $('heroMon').classList.add('attack'); setTimeout(()=>$('heroMon').classList.remove('attack'),360);
    const pct = (state.yokaiHp / state.yokaiHpMax * 100) + '%';
    fireProjectile($('heroMon'), $('yokai'), 'hero', () => { $('yokaiHp').style.width = pct; });

    if(state.yokaiHp <= 0){
      if(state.levelIdx >= LEVELS.length - 1){
        flashText('ぜんぶ クリア！','var(--gold)');
        setTimeout(()=>endGame(true), 900);
        return;
      }
      state.levelIdx++; state.yokaiIdx++; newQueue();
      flashText('レベルアップ！','var(--gold)');
      setTimeout(()=>{ spawnYokai(); renderTop(); nextQuestion(); }, 900);
    } else {
      setTimeout(nextQuestion, 700);
    }
  } else {
    btn.classList.add('wrong');
    flash('❌', 'var(--heart)');
    fireProjectile($('yokai'), $('heroMon'), 'enemy');
    if(CONFIG.penaltyMode === 'score') state.score = Math.max(0, state.score - 1);
    else state.hearts--;
    renderTop();

    if(state.hearts <= 0 && CONFIG.penaltyMode === 'heart'){
      setTimeout(()=>endGame(false), 700);
    } else {
      // 同じ問題のまま、もう一度えらべる（正解を光らせて教える）
      setTimeout(()=>{
        document.querySelectorAll('.choice').forEach(c=>{
          if(c.textContent === state.current.t) c.classList.add('correct');
          else c.classList.add('dim');
        });
      }, 450);
      setTimeout(()=>{ state.busy = false; nextQuestion(); }, 1500);
    }
  }
}

function endGame(win){
  if(win){ $('clearScore').textContent = state.score; show('cleared'); }
  else { $('overScore').textContent = state.score; show('over'); }
}

/* ---- 演出 ---- */
/* 効果音（Web Audio・ファイル不要） */
let audioCtx = null;
function ensureAudio(){
  if(!CONFIG.sound) return null;
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    audioCtx = new AC();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playBeam(kind){
  const ctx = ensureAudio(); if(!ctx) return;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = 'sawtooth';
  const f0 = kind === 'enemy' ? 520 : 940;
  const f1 = kind === 'enemy' ? 120 : 280;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.exponentialRampToValueAtTime(f1, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  osc.connect(g).connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.22);
}
function playImpact(){
  const ctx = ensureAudio(); if(!ctx) return;
  const t = ctx.currentTime, dur = 0.25;
  // ノイズの「バシッ」
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++){ data[i] = (Math.random()*2-1) * (1 - i/data.length); }
  const noise = ctx.createBufferSource(); noise.buffer = buf;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1500;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.38, t);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  noise.connect(lp).connect(ng).connect(ctx.destination);
  noise.start(t); noise.stop(t + dur);
  // 低い「ドン」
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(170, t);
  osc.frequency.exponentialRampToValueAtTime(55, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.3, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  osc.connect(g).connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.22);
}
function screenShake(){
  const app = $('app');
  app.classList.remove('shake'); void app.offsetWidth; app.classList.add('shake');
}

function centerIn(field, el){
  const fr = field.getBoundingClientRect(), r = el.getBoundingClientRect();
  return { x: r.left + r.width/2 - fr.left, y: r.top + r.height/2 - fr.top };
}
function impact(toEl){
  playImpact(); screenShake();
  toEl.classList.add('hit'); setTimeout(()=>toEl.classList.remove('hit'), 400);
  const field = document.querySelector('.field');
  const c = centerIn(field, toEl);
  const burst = document.createElement('div');
  burst.className = 'burst';
  burst.style.left = c.x + 'px'; burst.style.top = c.y + 'px';
  field.appendChild(burst);
  burst.animate(
    [{ transform:'translate(-50%,-50%) scale(.3)', opacity:1 },
     { transform:'translate(-50%,-50%) scale(6)', opacity:0 }],
    { duration: 360, easing: 'ease-out' }
  ).onfinish = () => burst.remove();
}
function fireProjectile(fromEl, toEl, kind, onImpact){
  playBeam(kind);
  const done = () => { impact(toEl); if(onImpact) onImpact(); };
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){ done(); return; }
  const field = document.querySelector('.field');
  const s = centerIn(field, fromEl), e = centerIn(field, toEl);
  const p = document.createElement('div');
  p.className = 'projectile ' + kind;
  p.style.left = s.x + 'px'; p.style.top = s.y + 'px';
  field.appendChild(p);
  const dx = e.x - s.x, dy = e.y - s.y;
  const tx = `calc(-50% ${dx>=0?'+':'-'} ${Math.abs(dx)}px)`;
  const ty = `calc(-50% ${dy>=0?'+':'-'} ${Math.abs(dy)}px)`;
  const anim = p.animate(
    [{ transform:'translate(-50%,-50%) scale(.5)', opacity:.6 },
     { transform:`translate(${tx}, ${ty}) scale(1)`, opacity:1 }],
    { duration: 420, easing: 'cubic-bezier(.45,0,.75,1)' }
  );
  anim.onfinish = () => { p.remove(); done(); };
}
function flash(symbol, color){
  const f = $('flash'); f.textContent = symbol; f.style.color = color; f.style.fontSize = '26vw';
  f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
}
function flashText(txt, color){
  const f = $('flash'); f.textContent = txt; f.style.color = color; f.style.fontSize = '14vw';
  f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
}

/* ---- イベント ---- */
$('startBtn').onclick = () => { buildHeroGrid(); show('select'); };
$('goBattle').onclick = () => { if(state.hero) startGame(); };
$('listenBtn').onclick = () => { if(state.current) speak(state.current.t); };
$('retryBtn').onclick = startGame;
$('againBtn').onclick = () => show('title');
